<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图灵知识图谱 - Turing Knowledge Graph</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: #00d4ff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        h1.sub { font-size: 1.2em; color: #888; margin-bottom: 30px; }
        h2 {
            color: #00d4ff;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 10px;
            margin: 25px 0 15px;
        }
        .block {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .person-card {
            background: rgba(231,76,60,0.15);
            border-left: 4px solid #e74c3c;
            padding: 20px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .person-card h3 { color: #e74c3c; margin-bottom: 10px; font-size: 1.4em; }
        .person-card p { margin: 8px 0; line-height: 1.6; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 8px;
        }
        .badge-person { background: #e74c3c; }
        .badge-event { background: #3498db; }
        .badge-location { background: #27ae60; }
        .badge-publication { background: #f39c12; }
        .badge-award { background: #9b59b6; }
        .badge-class { background: #636e72; }
        .badge-property { background: #00b894; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(0,212,255,0.2); color: #00d4ff; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.05); }
        .resource { color: #ffd93d; }
        .literal { color: #98d8aa; }
        .comment { color: #888; font-style: italic; }
        .reification {
            background: rgba(155,89,182,0.15);
            border-left: 4px solid #9b59b6;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .reification h4 { color: #9b59b6; margin-bottom: 10px; }
        .load-area {
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }
        .load-area input[type="file"] { display: none; }
        .load-area label {
            display: inline-block;
            background: #00d4ff;
            color: #1a1a2e;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .load-area label:hover { background: #00b8e6; transform: scale(1.05); }
        .ref-link { color: #ffd93d; font-family: monospace; font-size: 12px; }
        .hidden { display: none; }
        .entity-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .entity-tag {
            background: rgba(255,255,255,0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 13px;
            color: #ffd93d;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 1.2em;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图灵知识图谱</h1>
        <h1 class="sub">Turing Knowledge Graph</h1>

        <div id="content" class="hidden">
            <!-- 人物 -->
            <div class="block" id="personSection">
                <h2>人物 (Person)</h2>
                <div id="personContent"></div>
            </div>

            <!-- 事件 -->
            <div class="block" id="eventSection">
                <h2>事件 (Events)</h2>
                <table id="eventTable">
                    <thead><tr><th>事件</th><th>类型</th><th>日期</th><th>地点</th><th>描述</th></tr></thead>
                    <tbody id="eventBody"></tbody>
                </table>
            </div>

            <!-- 地点 -->
            <div class="block" id="locationSection">
                <h2>地点 (Locations)</h2>
                <table id="locationTable">
                    <thead><tr><th>城市</th><th>国家</th><th>描述</th></tr></thead>
                    <tbody id="locationBody"></tbody>
                </table>
            </div>

            <!-- 著作 -->
            <div class="block" id="publicationSection">
                <h2>学术著作 (Publications)</h2>
                <table id="publicationTable">
                    <thead><tr><th>著作</th><th>类型</th><th>年份</th><th>描述</th></tr></thead>
                    <tbody id="publicationBody"></tbody>
                </table>
            </div>

            <!-- 奖项 -->
            <div class="block" id="awardSection">
                <h2>荣誉奖项 (Awards)</h2>
                <table id="awardTable">
                    <thead><tr><th>奖项</th><th>类型</th><th>年份</th><th>描述</th></tr></thead>
                    <tbody id="awardBody"></tbody>
                </table>
            </div>

        </div>

        <div id="loading" class="loading">正在加载数据</div>

        <div id="loadArea" class="hidden">
            <div class="load-area">
                <p style="margin-bottom: 20px; color: #888;">自动加载失败，请手动选择 RDF/XML 文件</p>
                <input type="file" id="fileInput" accept=".xml,.ttl">
                <label for="fileInput">选择文件</label>
            </div>
        </div>
    </div>

    <script type="text/plain" id="embeddedTuringRdf">
<rdf:RDF
    xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
    xmlns:rdfs="http://www.w3.org/2000/01/rdf-schema#"
    xmlns:owl="http://www.w3.org/2002/07/owl#"
    xmlns:xsd="http://www.w3.org/2001/XMLSchema#"
    xmlns:turing="http://www.example.org/turing#"
    xml:base="http://www.example.org/turing">

    <!-- ==================== 本体引用 (Imports) ==================== -->
    <!-- 引用RDFS本体定义 -->
    <owl:Ontology rdf:about="http://www.example.org/turing">
        <rdfs:comment>图灵知识图谱 - 包含RDFS类和属性定义</rdfs:comment>
        <!-- 通过RDF声明引入外部本体 -->
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </owl:Ontology>

    <!-- ==================== 类定义（内联） ==================== -->
    <!-- 这些类定义与 ontology/turing-rdfs.xml 中的定义保持一致 -->
    
    <!-- 人物 -->
    <rdfs:Class rdf:ID="Person" rdfs:label="人物">
        <rdfs:comment>表示艾伦·图灵本人及相��人物</rdfs:comment>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <!-- 事件类 -->
    <rdfs:Class rdf:ID="Event" rdfs:label="事件">
        <rdfs:comment>表示事件，包括学术事件、个人事件和历史事件</rdfs:comment>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <!-- 事件子类 -->
    <rdfs:Class rdf:ID="AcademicEvent" rdfs:label="学术事件">
        <rdfs:subClassOf rdf:resource="#Event"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="PersonalEvent" rdfs:label="个人事件">
        <rdfs:subClassOf rdf:resource="#Event"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="HistoricalEvent" rdfs:label="历史事件">
        <rdfs:subClassOf rdf:resource="#Event"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <!-- 地点类 -->
    <rdfs:Class rdf:ID="Location" rdfs:label="地点">
        <rdfs:comment>表示地理位置</rdfs:comment>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="City" rdfs:label="城市">
        <rdfs:subClassOf rdf:resource="#Location"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <!-- 学术著作类 -->
    <rdfs:Class rdf:ID="Publication" rdfs:label="学术著作">
        <rdfs:comment>表示图灵的学术著作</rdfs:comment>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="Paper" rdfs:label="论文">
        <rdfs:subClassOf rdf:resource="#Publication"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="TechnicalReport" rdfs:label="技术报告">
        <rdfs:subClassOf rdf:resource="#Publication"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <!-- 荣誉奖项类 -->
    <rdfs:Class rdf:ID="Award" rdfs:label="荣誉奖项">
        <rdfs:comment>表示荣誉和奖项</rdfs:comment>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="AcademicAward" rdfs:label="学术奖项">
        <rdfs:subClassOf rdf:resource="#Award"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <rdfs:Class rdf:ID="HonoraryTitle" rdfs:label="荣誉称号">
        <rdfs:subClassOf rdf:resource="#Award"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdfs:Class>

    <!-- ==================== 属性定义（内联） ==================== -->
    <!-- 对象属性 -->
    <rdf:Property rdf:ID="participatedIn" rdfs:label="参与事件">
        <rdfs:domain rdf:resource="#Person"/>
        <rdfs:range rdf:resource="#Event"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="wrote" rdfs:label="撰写著作">
        <rdfs:domain rdf:resource="#Person"/>
        <rdfs:range rdf:resource="#Publication"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="received" rdfs:label="获得奖项">
        <rdfs:domain rdf:resource="#Person"/>
        <rdfs:range rdf:resource="#Award"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="happenedAt" rdfs:label="事件发生地点">
        <rdfs:domain rdf:resource="#Event"/>
        <rdfs:range rdf:resource="#Location"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <!-- 数据类型属性 -->
    <rdf:Property rdf:ID="eventDate" rdfs:label="事件发生日期">
        <rdfs:domain rdf:resource="#Event"/>
        <rdfs:range rdf:resource="http://www.w3.org/2001/XMLSchema#date"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="publicationYear" rdfs:label="发表年份">
        <rdfs:domain rdf:resource="#Publication"/>
        <rdfs:range rdf:resource="http://www.w3.org/2001/XMLSchema#gYear"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="awardYear" rdfs:label="获奖年份">
        <rdfs:domain rdf:resource="#Award"/>
        <rdfs:range rdf:resource="http://www.w3.org/2001/XMLSchema#gYear"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="description" rdfs:label="描述信息">
        <rdfs:domain rdf:resource="http://www.w3.org/2000/01/rdf-schema#Resource"/>
        <rdfs:range rdf:resource="http://www.w3.org/2001/XMLSchema#string"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <rdf:Property rdf:ID="country" rdfs:label="所属国家">
        <rdfs:domain rdf:resource="#Location"/>
        <rdfs:range rdf:resource="http://www.w3.org/2001/XMLSchema#string"/>
        <rdfs:isDefinedBy rdf:resource="ontology/turing-rdfs.xml"/>
    </rdf:Property>

    <!-- ==================== 人物实例 ==================== -->

    <turing:Person rdf:ID="AlanTuring" rdfs:isDefinedBy="[http://www.example.org/turing Person]">
        <rdfs:label>艾伦·图灵</rdfs:label>
        <turing:description>艾伦·图灵（1912-1954），英国数学家、逻辑学家、计算机科学家，被视为计算机科学之父</turing:description>

        <!-- 参与事件 -->
        <turing:participatedIn rdf:resource="#Event_Birth"/>
        <turing:participatedIn rdf:resource="#Event_CambridgeEnrollment"/>
        <turing:participatedIn rdf:resource="#Event_TuringMachinePaper"/>
        <turing:participatedIn rdf:resource="#Event_PrincetonPhD"/>
        <turing:participatedIn rdf:resource="#Event_BletchleyPark"/>
        <turing:participatedIn rdf:resource="#Event_BombeDesign"/>
        <turing:participatedIn rdf:resource="#Event_ManchesterUniversity"/>
        <turing:participatedIn rdf:resource="#Event_TuringTestPaper"/>
        <turing:participatedIn rdf:resource="#Event_Trial"/>
        <turing:participatedIn rdf:resource="#Event_Death"/>

        <!-- 撰写著作 -->
        <turing:wrote rdf:resource="#Publication_ComputableNumbers"/>
        <turing:wrote rdf:resource="#Publication_ComputingIntelligence"/>
        <turing:wrote rdf:resource="#Publication_ChemicalBasis"/>
        <turing:wrote rdf:resource="#Publication_ACEReport"/>

        <!-- 获得奖项 -->
        <turing:received rdf:resource="#Award_FRS"/>
        <turing:received rdf:resource="#Award_OBE"/>
        <turing:received rdf:resource="#Award_RoyalPardon"/>
    </turing:Person>

    <!-- ==================== 事件实例 ==================== -->

    <!-- 图灵出生 -->
    <turing:PersonalEvent rdf:ID="Event_Birth">
        <rdfs:label>图灵出生</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1912-06-23</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_London"/>
        <turing:description>艾伦·图灵出生于伦敦</turing:description>
    </turing:PersonalEvent>

    <!-- 剑桥入学 -->
    <turing:AcademicEvent rdf:ID="Event_CambridgeEnrollment">
        <rdfs:label>剑桥入学</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1931-10-01</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Cambridge"/>
        <turing:description>进入剑桥大学国王学院学习</turing:description>
    </turing:AcademicEvent>

    <!-- 发表图灵机论文 -->
    <turing:AcademicEvent rdf:ID="Event_TuringMachinePaper">
        <rdfs:label>发表图灵机论文</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1936-11-30</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_London"/>
        <turing:description>发表《论可计算数及其在判定问题中的应用》</turing:description>
    </turing:AcademicEvent>

    <!-- 普林斯顿博士 -->
    <turing:AcademicEvent rdf:ID="Event_PrincetonPhD">
        <rdfs:label>普林斯顿博士</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1938-06-01</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Princeton"/>
        <turing:description>获普林斯顿大学博士学位</turing:description>
    </turing:AcademicEvent>

    <!-- 加入布莱切利园 -->
    <turing:AcademicEvent rdf:ID="Event_BletchleyPark">
        <rdfs:label>加入布莱切利园</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1939-09-01</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Bletchley"/>
        <turing:description>加入密码破译机构</turing:description>
    </turing:AcademicEvent>

    <!-- 设计Bombe破译机 -->
    <turing:AcademicEvent rdf:ID="Event_BombeDesign">
        <rdfs:label>设计Bombe破译机</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1940-01-01</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Bletchley"/>
        <turing:description>研发恩尼格玛破解设备</turing:description>
    </turing:AcademicEvent>

    <!-- 曼彻斯特大学任教 -->
    <turing:AcademicEvent rdf:ID="Event_ManchesterUniversity">
        <rdfs:label>曼彻斯特大学任教</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1948-10-01</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Manchester"/>
        <turing:description>任计算机实验室副主任</turing:description>
    </turing:AcademicEvent>

    <!-- 发表图灵测试论文 -->
    <turing:AcademicEvent rdf:ID="Event_TuringTestPaper">
        <rdfs:label>发表图灵测试论文</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1950-10-01</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Manchester"/>
        <turing:description>发表《计算机与智能》</turing:description>
    </turing:AcademicEvent>

    <!-- 图灵审判 -->
    <turing:PersonalEvent rdf:ID="Event_Trial">
        <rdfs:label>图灵审判</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1952-03-31</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Wilmslow"/>
        <turing:description>因同性恋行为被判化学阉割</turing:description>
    </turing:PersonalEvent>

    <!-- 图灵逝世 -->
    <turing:PersonalEvent rdf:ID="Event_Death">
        <rdfs:label>图灵逝世</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">1954-06-07</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_Wilmslow"/>
        <turing:description>因氰化物中毒逝世</turing:description>
    </turing:PersonalEvent>

    <!-- 英国政府道歉 -->
    <turing:HistoricalEvent rdf:ID="Event_GovernmentApology">
        <rdfs:label>英国政府道歉</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">2009-09-10</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_London"/>
        <turing:description>英国政府正式道歉</turing:description>
    </turing:HistoricalEvent>

    <!-- 皇家赦免 -->
    <turing:HistoricalEvent rdf:ID="Event_RoyalPardon">
        <rdfs:label>皇家赦免</rdfs:label>
        <turing:eventDate rdf:datatype="http://www.w3.org/2001/XMLSchema#date">2013-12-24</turing:eventDate>
        <turing:happenedAt rdf:resource="#Location_London"/>
        <turing:description>获英国皇家赦免</turing:description>
    </turing:HistoricalEvent>

    <!-- ==================== 地点实例 ==================== -->

    <!-- 伦敦 -->
    <turing:City rdf:ID="Location_London">
        <rdfs:label>伦敦</rdfs:label>
        <turing:country>英国</turing:country>
        <turing:description>图灵出生地</turing:description>
    </turing:City>

    <!-- 剑桥 -->
    <turing:City rdf:ID="Location_Cambridge">
        <rdfs:label>剑桥</rdfs:label>
        <turing:country>英国</turing:country>
        <turing:description>剑桥大学所在地</turing:description>
    </turing:City>

    <!-- 普林斯顿 -->
    <turing:City rdf:ID="Location_Princeton">
        <rdfs:label>普林斯顿</rdfs:label>
        <turing:country>美国</turing:country>
        <turing:description>普林斯顿大学所在地</turing:description>
    </turing:City>

    <!-- 布莱切利 -->
    <turing:City rdf:ID="Location_Bletchley">
        <rdfs:label>布莱切利</rdfs:label>
        <turing:country>英国</turing:country>
        <turing:description>布莱切利园所在地</turing:description>
    </turing:City>

    <!-- 曼彻斯特 -->
    <turing:City rdf:ID="Location_Manchester">
        <rdfs:label>曼彻斯特</rdfs:label>
        <turing:country>英国</turing:country>
        <turing:description>曼彻斯特大学所在地</turing:description>
    </turing:City>

    <!-- 威尔姆斯洛 -->
    <turing:City rdf:ID="Location_Wilmslow">
        <rdfs:label>威尔姆斯洛</rdfs:label>
        <turing:country>英国</turing:country>
        <turing:description>图灵晚年居住地及逝世地</turing:description>
    </turing:City>

    <!-- ==================== 学术著作实例 ==================== -->

    <!-- 论可计算数及其在判定问题中的应用 -->
    <turing:Paper rdf:ID="Publication_ComputableNumbers">
        <rdfs:label>论可计算数及其在判定问题中的应用</rdfs:label>
        <turing:publicationYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1936</turing:publicationYear>
        <turing:description>提出图灵机概念，奠定计算理论基础</turing:description>
    </turing:Paper>

    <!-- 计算机与智能 -->
    <turing:Paper rdf:ID="Publication_ComputingIntelligence">
        <rdfs:label>计算机与智能</rdfs:label>
        <turing:publicationYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1950</turing:publicationYear>
        <turing:description>提出图灵测试，开启人工智能研究</turing:description>
    </turing:Paper>

    <!-- 形态发生的化学基础 -->
    <turing:Paper rdf:ID="Publication_ChemicalBasis">
        <rdfs:label>形态发生的化学基础</rdfs:label>
        <turing:publicationYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1952</turing:publicationYear>
        <turing:description>数学生物学领域开创性工作</turing:description>
    </turing:Paper>

    <!-- ACE计算机设计报告 -->
    <turing:TechnicalReport rdf:ID="Publication_ACEReport">
        <rdfs:label>ACE计算机设计报告</rdfs:label>
        <turing:publicationYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1945</turing:publicationYear>
        <turing:description>早期存储程序计算机设计方案</turing:description>
    </turing:TechnicalReport>

    <!-- ==================== 荣誉奖项实例 ==================== -->

    <!-- 英国皇家学会院士 -->
    <turing:AcademicAward rdf:ID="Award_FRS" rdfs:isDefinedBy="[http://www.example.org/turing AcademicAward]">
        <rdfs:label>英国皇家学会院士</rdfs:label>
        <turing:awardYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1951</turing:awardYear>
        <turing:description>当选皇家学会院士</turing:description>
    </turing:AcademicAward>

    <!-- 大英帝国勋章 -->
    <turing:HonoraryTitle rdf:ID="Award_OBE">
        <rdfs:label>大英帝国勋章</rdfs:label>
        <turing:awardYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1946</turing:awardYear>
        <turing:description>表彰二战密码破译贡献</turing:description>
    </turing:HonoraryTitle>

    <!-- 图灵奖 -->
    <turing:AcademicAward rdf:ID="Award_Turing">
        <rdfs:label>图灵奖</rdfs:label>
        <turing:awardYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">1966</turing:awardYear>
        <turing:description>以他命名的计算机界最高奖</turing:description>
    </turing:AcademicAward>

    <!-- 英国50英镑纸币 -->
    <turing:HonoraryTitle rdf:ID="Award_Banknote">
        <rdfs:label>英国50英镑纸币</rdfs:label>
        <turing:awardYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">2021</turing:awardYear>
        <turing:description>头像印于新版50英镑纸币</turing:description>
    </turing:HonoraryTitle>

    <!-- 皇家赦免 -->
    <turing:HonoraryTitle rdf:ID="Award_RoyalPardon">
        <rdfs:label>皇家赦免</rdfs:label>
        <turing:awardYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">2013</turing:awardYear>
        <turing:description>英国女王签署赦免令</turing:description>
    </turing:HonoraryTitle>

    <!-- 艾伦·图灵法案 -->
    <turing:HonoraryTitle rdf:ID="Award_TuringAct">
        <rdfs:label>艾伦·图灵法案</rdfs:label>
        <turing:awardYear rdf:datatype="http://www.w3.org/2001/XMLSchema#gYear">2017</turing:awardYear>
        <turing:description>赦免历史上因同性恋定罪者</turing:description>
    </turing:HonoraryTitle>

    <!-- ==================== RDF Reification 多元关系 ==================== -->

    <!-- 布莱切利园工作期（包含时间范围和角色信息） -->
    <rdf:Statement rdf:ID="Statement_BletchleyWork">
        <rdf:subject rdf:resource="#AlanTuring"/>
        <rdf:predicate rdf:resource="http://www.example.org/turing#participatedIn"/>
        <rdf:object rdf:resource="#Event_BletchleyPark"/>
        <turing:period>1939-1945</turing:period>
        <turing:role>首席密码学家</turing:role>
    </rdf:Statement>

</rdf:RDF>
    </script>

    <script>
        const NS = {
            rdf: 'http://www.w3.org/1999/02/22-rdf-syntax-ns#',
            rdfs: 'http://www.w3.org/2000/01/rdf-schema#',
            turing: 'http://www.example.org/turing#'
        };

        const parser = new DOMParser();
        let entityLabels = {};

        function applyParsedDoc(doc) {
            const err = doc.querySelector('parsererror');
            if (err) throw new Error('XML 解析失败');
            buildLabelMap(doc);
            showContent();
            renderPerson(doc);
            renderEvents(doc);
            renderLocations(doc);
            renderPublications(doc);
            renderAwards(doc);
        }

        // 内嵌数据（file:// 下 fetch 本地文件会被浏览器拦截，故优先使用）
        window.addEventListener('DOMContentLoaded', async () => {
            const embedded = document.getElementById('embeddedTuringRdf');
            if (embedded && embedded.textContent.trim()) {
                try {
                    const doc = parser.parseFromString(embedded.textContent.trim(), 'application/xml');
                    applyParsedDoc(doc);
                    return;
                } catch (e) {
                    console.error(e);
                }
            }
            try {
                let res = await fetch('turing-full-data.xml');
                if (!res.ok) res = await fetch('../turing-full-data.xml');
                if (!res.ok) throw new Error('fetch failed');
                const doc = parser.parseFromString(await res.text(), 'application/xml');
                applyParsedDoc(doc);
            } catch (error) {
                console.error('自动加载失败:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('loadArea').classList.remove('hidden');
                document.getElementById('fileInput').addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    const doc = parser.parseFromString(await file.text(), 'application/xml');
                    applyParsedDoc(doc);
                });
            }
        });

        function showContent() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('loadArea').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }

        function buildLabelMap(doc) {
            entityLabels = {};
            const allElements = doc.getElementsByTagName('*');
            for (const el of allElements) {
                const rdfId = el.getAttribute('rdf:ID');
                if (rdfId) {
                    const label = el.getElementsByTagNameNS(NS.rdfs, 'label')[0];
                    entityLabels[rdfId] = label ? label.textContent : rdfId;
                }
            }
        }

        function getLabel(item) {
            const label = item.getElementsByTagNameNS(NS.rdfs, 'label')[0];
            return label ? label.textContent : item.getAttribute('rdf:ID') || '';
        }

        function getType(item) {
            const tag = item.tagName.toLowerCase();
            if (tag.includes('academic')) return '学术';
            if (tag.includes('personal')) return '个人';
            if (tag.includes('historical')) return '历史';
            if (tag.includes('paper')) return '论文';
            if (tag.includes('report')) return '报告';
            if (tag.includes('book')) return '书籍';
            return '';
        }

        function getResourceId(item, prop) {
            const el = item.getElementsByTagNameNS(NS.turing, prop)[0];
            if (el) {
                const res = el.getAttributeNS(NS.rdf, 'resource');
                return res ? res.replace('#', '') : '';
            }
            return '';
        }

        function getValue(item, prop) {
            const el = item.getElementsByTagNameNS(NS.turing, prop)[0];
            return el ? el.textContent : '';
        }

        function getEntityLabel(id) {
            return entityLabels[id] || id;
        }

        function renderPerson(doc) {
            const persons = doc.getElementsByTagNameNS(NS.turing, 'Person');
            let html = '';
            for (const p of persons) {
                const name = getLabel(p);
                const desc = getValue(p, 'description');
                const events = p.getElementsByTagNameNS(NS.turing, 'participatedIn');
                const pubs = p.getElementsByTagNameNS(NS.turing, 'wrote');
                const awards = p.getElementsByTagNameNS(NS.turing, 'received');

                const eventTags = Array.from(events).map(e => {
                    const id = e.getAttributeNS(NS.rdf, 'resource').replace('#', '');
                    return `<span class="entity-tag">${getEntityLabel(id)}</span>`;
                });

                const pubTags = Array.from(pubs).map(e => {
                    const id = e.getAttributeNS(NS.rdf, 'resource').replace('#', '');
                    return `<span class="entity-tag">${getEntityLabel(id)}</span>`;
                });

                const awardTags = Array.from(awards).map(e => {
                    const id = e.getAttributeNS(NS.rdf, 'resource').replace('#', '');
                    return `<span class="entity-tag">${getEntityLabel(id)}</span>`;
                });

                html += `<div class="person-card">
                    <h3><span class="badge badge-person">人</span>${name}</h3>
                    <p>${desc}</p>
                    <p><strong>参与事件:</strong></p>
                    <div class="entity-list">${eventTags.join('') || '无'}</div>
                    <p style="margin-top:10px"><strong>撰写著作:</strong></p>
                    <div class="entity-list">${pubTags.join('') || '无'}</div>
                    <p style="margin-top:10px"><strong>获得奖项:</strong></p>
                    <div class="entity-list">${awardTags.join('') || '无'}</div>
                </div>`;
            }
            document.getElementById('personContent').innerHTML = html;
        }

        function renderEvents(doc) {
            const types = ['AcademicEvent', 'PersonalEvent', 'HistoricalEvent'];
            const eventData = [];

            for (const t of types) {
                const items = doc.getElementsByTagNameNS(NS.turing, t);
                for (const item of items) {
                    const id = item.getAttribute('rdf:ID');
                    const label = getLabel(item);
                    const type = getType(item);
                    const date = getValue(item, 'eventDate');
                    const locId = getResourceId(item, 'happenedAt');
                    const locLabel = getEntityLabel(locId);
                    const desc = getValue(item, 'description');
                    eventData.push({ label, type, date, locLabel, desc });
                }
            }

            eventData.sort((a, b) => new Date(a.date) - new Date(b.date));

            let rows = '';
            for (const e of eventData) {
                rows += `<tr>
                    <td>${e.label}</td>
                    <td><span class="badge badge-event">${e.type}</span></td>
                    <td>${e.date}</td>
                    <td><span class="resource">${e.locLabel}</span></td>
                    <td>${e.desc}</td>
                </tr>`;
            }
            document.getElementById('eventBody').innerHTML = rows;
        }

        function renderLocations(doc) {
            const items = doc.getElementsByTagNameNS(NS.turing, 'City');
            let rows = '';
            for (const item of items) {
                const label = getLabel(item);
                const country = getValue(item, 'country');
                const desc = getValue(item, 'description');
                rows += `<tr><td><span class="badge badge-location">地</span>${label}</td><td>${country}</td><td>${desc}</td></tr>`;
            }
            document.getElementById('locationBody').innerHTML = rows;
        }

        function renderPublications(doc) {
            const types = ['Paper', 'TechnicalReport', 'Book'];
            let rows = '';
            for (const t of types) {
                const items = doc.getElementsByTagNameNS(NS.turing, t);
                for (const item of items) {
                    const label = getLabel(item);
                    const type = getType(item);
                    const year = getValue(item, 'publicationYear');
                    const desc = getValue(item, 'description');
                    rows += `<tr><td>${label}</td><td><span class="badge badge-publication">${type}</span></td><td>${year}</td><td>${desc}</td></tr>`;
                }
            }
            document.getElementById('publicationBody').innerHTML = rows;
        }

        function renderAwards(doc) {
            const types = ['AcademicAward', 'HonoraryTitle'];
            let rows = '';
            for (const t of types) {
                const items = doc.getElementsByTagNameNS(NS.turing, t);
                for (const item of items) {
                    const label = getLabel(item);
                    const type = t === 'AcademicAward' ? '学术' : '荣誉';
                    const year = getValue(item, 'awardYear');
                    const desc = getValue(item, 'description');
                    rows += `<tr><td>${label}</td><td><span class="badge badge-award">${type}</span></td><td>${year}</td><td>${desc}</td></tr>`;
                }
            }
            document.getElementById('awardBody').innerHTML = rows;
        }

    </script>
</body>
</html>
